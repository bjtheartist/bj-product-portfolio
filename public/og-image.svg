<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A1A"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FAF9F6" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Red accent bar -->
  <rect x="80" y="160" width="6" height="120" fill="#dc2626"/>

  <!-- Brand name -->
  <text x="110" y="220" font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif" font-weight="900" font-size="72" fill="#FAF9F6" letter-spacing="4">KIVARA</text>
  <text x="110" y="280" font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif" font-weight="900" font-size="72" fill="#dc2626" letter-spacing="4">STUDIOS</text>

  <!-- Tagline -->
  <text x="110" y="340" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#FAF9F6" opacity="0.6">Digital strategies that help you stand out.</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#dc2626"/>
  <text x="80" y="613" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#FAF9F6" font-weight="600" letter-spacing="2">KIVARASTUDIOS.DEV</text>

  <!-- Corner accent -->
  <rect x="1100" y="80" width="40" height="40" fill="#dc2626"/>
  <rect x="1050" y="80" width="40" height="40" fill="none" stroke="#dc2626" stroke-width="2"/>
</svg>
